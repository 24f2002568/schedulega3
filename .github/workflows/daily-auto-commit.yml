name: Daily Automated Commit

on:
  schedule:
    - cron: "30 6 * * *"   # Runs daily at 06:30 UTC
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log file - 24f2002568@ds.study.iitm.ac.in
        run: |
          echo "Automated update run on $(date -u)" >> daily_log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_log.txt
          git commit -m "Daily automated commit"
          git push
